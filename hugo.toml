baseURL = "https://huangxiaopingRD.github.io/"
languageCode = "zh-cn"
title = "Xiaoping's Blog"
theme = "PaperMod"
paginate = 10

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[minify]
  disableXML = true
  minifyOutput = true

[params]
  env = "production"
  author = "Xiaoping Huang"
  description = "个人技术博客"
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  hidemeta = false
  hideSummary = false
  showtoc = true

  [params.homeInfoParams]
    Title = "Hello"
    Content = "欢迎来到我的博客 — 记录技术探索与思考"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/huangxiaopingRD"

[params.assets]
  disableHLJS = true

[params.cover]
  hidden = false
  hiddenInList = false
  hiddenInSingle = true

[params.fuseOpts]
  isCaseSensitive = false
  shouldSort = true
  location = 0
  distance = 1000
  threshold = 0.4
  minMatchCharLength = 0
  keys = ["title", "permalink", "summary", "content"]

[markup]
  [markup.highlight]
    noClasses = false

[[menu.main]]
  identifier = "archives"
  name = "归档"
  url = "/archives/"
  weight = 5

[[menu.main]]
  identifier = "tags"
  name = "标签"
  url = "/tags/"
  weight = 10

[[menu.main]]
  identifier = "search"
  name = "搜索"
  url = "/search/"
  weight = 15

[outputs]
  home = ["HTML", "RSS", "JSON"]
